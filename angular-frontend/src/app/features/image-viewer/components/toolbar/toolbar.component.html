@let zoomPercent = imageViewerDataService.zoomPercent$ | async;
@let currentPage = imageViewerDataService.currentPage$ | async;
@let totalPages = imageViewerDataService.totalPages$ | async;

<p-toolbar>
    <ng-template #start>
        <p-button text (click)="imageViewerDataService.setVisible(false)">
            <svg xmlns="http://www.w3.org/2000/svg" height="1rem" viewBox="0 -960 960 960" width="1rem" fill="#1f1f1f">
                <path d="m313-440 224 224-57 56-320-320 320-320 57 56-224 224h487v80H313Z" />
            </svg>
        </p-button>

        @if(currentPage) {
        <p class="ml-3 flex align-middle gap-1 font-medium color-[#1f1f1f]">
            <span>{{ currentPage.serialNumber + 1 }}</span>
            <span>/</span>
            <span>{{ totalPages }}</span>
        </p>
        }
    </ng-template>

    <ng-template #center>
        <p-button text (click)="imageViewerDataService.rotateLeft()" [disabled]="!currentPage">
            <svg xmlns="http://www.w3.org/2000/svg" height="1rem" viewBox="0 -960 960 960" width="1rem" fill="#1f1f1f">
                <path
                    d="M440-80q-50-5-96-24.5T256-156l56-58q29 21 61.5 34t66.5 18v82Zm80 0v-82q104-15 172-93.5T760-438q0-117-81.5-198.5T480-718h-8l64 64-56 56-160-160 160-160 56 58-62 62h6q75 0 140.5 28.5t114 77q48.5 48.5 77 114T840-438q0 137-91 238.5T520-80ZM198-214q-32-42-51.5-88T122-398h82q5 34 18 66.5t34 61.5l-58 56Zm-76-264q6-51 25-98t51-86l58 56q-21 29-34 61.5T204-478h-82Z" />
            </svg>
        </p-button>
        <p-button text (click)="imageViewerDataService.rotateRight()" [disabled]="!currentPage">
            <svg xmlns="http://www.w3.org/2000/svg" height="1rem" viewBox="0 -960 960 960" width="1rem" fill="#1f1f1f">
                <path
                    d="M522-80v-82q34-5 66.5-18t61.5-34l56 58q-42 32-88 51.5T522-80Zm-80 0Q304-98 213-199.5T122-438q0-75 28.5-140.5t77-114q48.5-48.5 114-77T482-798h6l-62-62 56-58 160 160-160 160-56-56 64-64h-8q-117 0-198.5 81.5T202-438q0 104 68 182.5T442-162v82Zm322-134-58-56q21-29 34-61.5t18-66.5h82q-5 50-24.5 96T764-214Zm76-264h-82q-5-34-18-66.5T706-606l58-56q32 39 51 86t25 98Z" />
            </svg>
        </p-button>

        <p-button text (click)="imageViewerDataService.zoomIn()" [disabled]="!currentPage">
            <svg xmlns="http://www.w3.org/2000/svg" height="1rem" viewBox="0 -960 960 960" width="1rem" fill="#1f1f1f">
                <path d="M440-120v-320H120v-80h320v-320h80v320h320v80H520v320h-80Z" />
            </svg>
        </p-button>
        <p-button text (click)="imageViewerDataService.zoomOut()" [disabled]="!currentPage">
            <svg xmlns="http://www.w3.org/2000/svg" height="1rem" viewBox="0 -960 960 960" width="1rem" fill="#1f1f1f">
                <path d="M200-440v-80h560v80H200Z" />
            </svg>
        </p-button>
        <p-button text (click)="imageViewerDataService.resetZoom()" [disabled]="!currentPage">
            <svg xmlns="http://www.w3.org/2000/svg" height="1rem" viewBox="0 -960 960 960" width="1rem" fill="#1f1f1f">
                <path
                    d="M120-120v-200h80v120h120v80H120Zm520 0v-80h120v-120h80v200H640ZM120-640v-200h200v80H200v120h-80Zm640 0v-120H640v-80h200v200h-80Z" />
            </svg>
        </p-button>

        <p-button label="{{ zoomPercent ?? 100 }}%" text [style]="{color:'#1f1f1f'}" [disabled]="!currentPage"
            (click)="imageViewerDataService.setZoomPercent(100)">
        </p-button>
    </ng-template>

    <ng-template #end>
    </ng-template>
</p-toolbar>
