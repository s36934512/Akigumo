<app-layout>
    <div class="max-w-4xl mx-auto">
        <div class="mb-4 rounded-lg border border-slate-200 bg-white p-4 shadow-sm">
            <div class="flex flex-wrap items-center justify-between gap-2">
                <h3 class="text-base font-semibold">Index Sync (Bootstrap + SSE Patch)</h3>
                <div class="text-sm text-slate-600">
                    total: {{ indexTotalCount$ | async }}
                    | version: {{ indexVersion$ | async }}
                </div>
            </div>

            @if (bootstrapError) {
            <div class="mt-2 text-sm text-red-600">{{ bootstrapError }}</div>
            }

            <div class="mt-3 max-h-48 overflow-auto rounded border border-slate-200">
                @for (entry of (indexEntries$ | async); track entry.id) {
                <div class="border-b border-slate-100 px-3 py-2 text-xs last:border-b-0">
                    <div class="font-medium">{{ entry.name }}</div>
                    <div class="text-slate-600">{{ entry.type }} | {{ entry.id }}</div>
                </div>
                }
            </div>
        </div>

        <div id="uppy-dashboard" class="flex items-center justify-center"></div>
    </div>
</app-layout>
