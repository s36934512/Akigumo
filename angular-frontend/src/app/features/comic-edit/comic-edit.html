@let focusedPage = comicEditData.focusedPage$ | async;

<p-dialog [modal]="true" [dismissableMask]="true" [visible]="(comicEditData.visible$ | async) || false"
    (visibleChange)="comicEditData.setVisible($event)" [style]="{ width: '95%', height: '95%' }"
    [contentStyle]="{ height: '100%', padding: '5px', borderTop: '1px solid #ccc' }"
    (onHide)="comicEditData.setDefaults()">

    <ng-template pTemplate="header">
        <div class="flex items-center gap-2">
            <h3 class="text-lg font-black uppercase m-0 text-black">頁面重排與檢視</h3>
            <span class="material-icons text-cyan-500 align-middle cursor-pointer" title="拖動縮圖可調整閱讀順序，點擊圖面可放大"
                (click)="showTip = !showTip">info</span>
            <span *ngIf="showTip"
                class="ml-2 px-2 py-1 bg-cyan-50 text-cyan-700 text-xs rounded shadow">拖動縮圖可調整閱讀順序，點擊圖面可放大</span>
        </div>
    </ng-template>

    <div class="relative w-full h-full flex flex-col md:flex-row">

        <!-- 左側：大量瀏覽與重排區 (65%) -->
        <div class="md:w-[65%] bg-gray-50 flex flex-col border-r relative">
            <app-toolbar></app-toolbar>

            <!-- 網格瀏覽區 -->
            <div class="flex-1 overflow-y-auto p-10 custom-scrollbar-dark">
                <app-page-grid></app-page-grid>
            </div>

            <!-- 放大聚焦層 (Lightbox Overlay) -->
            <app-lightbox></app-lightbox>
        </div>


        <!-- 右側：深度編輯表單 (35%) -->
        <div class="md:w-[35%] flex flex-col bg-white">
            <div class="flex-1 overflow-y-auto p-8 custom-scrollbar space-y-8">
                <section>
                    <h4 class="text-xs font-black uppercase tracking-widest mb-6 flex items-center gap-2 text-black">
                        <span class="w-1 h-4 bg-cyan-500 rounded-full"></span> 基本資訊
                    </h4>

                    <app-info-form [fieldClass]="'grid grid-cols-2 gap-4 space-y-1 my-2'" />
                </section>

                <section>
                    <h4 class="text-xs font-black uppercase tracking-widest mb-6 flex items-center gap-2 text-black">
                        <span class="w-1 h-4 bg-orange-400 rounded-full"></span> 作品描述
                    </h4>
                    <textarea [ngModel]="(comicEditData.description$ | async)" rows="5"
                        (ngModelChange)="comicEditData.updateDescription($event)"
                        class="w-full bg-gray-50 border-none rounded-2xl px-5 py-4 text-sm font-bold text-black outline-none resize-none"
                        placeholder="輸入作品介紹..."></textarea>
                </section>
            </div>

            <div class="p-2 border-t gap-2 w-full">
                <p-button label="確認入庫同步" fluid size="large" (click)="saveFileInfo()" />
            </div>
        </div>
    </div>
</p-dialog>
