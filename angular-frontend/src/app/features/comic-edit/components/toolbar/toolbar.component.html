@let cols = (comicEditData.gridCols$ | async);
@let deleteMode = (comicEditData.deleteMode$ | async);

<div class="flex items-center gap-4">
    <button (click)="comicEditData.toggleDeleteMode()"
        [class]="deleteMode ? 'bg-red-500 text-white shadow-[0_0_25px_rgba(239,68,68,0.4)] border-transparent' : 'bg-white/5 text-gray-400 border-white/10'"
        class="flex items-center gap-3 px-5 py-2.5 border rounded-xl transition-all active:scale-95 group">
        <span class="material-icons text-lg group-hover:shake">{{ deleteMode ? 'check_circle' :'delete' }}</span>
        <span class="text-sm font-semibold">{{ deleteMode ? '完成編輯' : '刪除模式' }}</span>
    </button>

    <div class="flex">
        <p-button icon="pi pi-minus" (click)="this.comicEditData.decreaseGridCols();"
            [disabled]="cols == null || cols <= 2" [style.opacity]="cols == null || cols <= 2 ? '0.2' : '1'" />

        <div class="px-3 flex flex-col items-center">
            <span class="text-[9px] font-black text-cyan-400 uppercase tracking-tighter">Density</span>
            <span class="text-[12px] font-mono font-bold ">{{ cols }}</span>
        </div>

        <p-button icon="pi pi-plus" (click)="this.comicEditData.incrementGridCols();"
            [disabled]="cols == null || cols >= 8" [style.opacity]="cols == null ||cols >= 8 ? '0.2' : '1'" />
    </div>

    <button (click)="comicEditData.toggleSort()"
        class="flex items-center gap-2 px-5 py-2.5 bg-white/5 border border-white/10 rounded-xl hover:bg-white/10 transition-all active:scale-95 group relative overflow-hidden">
        <div class="absolute inset-0 bg-cyan-500/10 opacity-0 group-hover:opacity-100 transition-opacity">
        </div>

        <i class="pi {{ (comicEditData.sortIcon$ | async) }}"></i>

        <div class="flex flex-col items-start leading-none">
            <span class="text-[10px] text-gray-500 uppercase tracking-widest font-bold mb-1">Sorting</span>
            <span class="text-sm font-semibold tracking-wide">{{ (comicEditData.sortLabel$ | async) }}</span>
        </div>
    </button>
</div>
