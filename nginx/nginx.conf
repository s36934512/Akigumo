user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression for better performance
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss 
               application/rss+xml font/truetype font/opentype 
               application/vnd.ms-fontobject image/svg+xml;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # Upstream backend server
    upstream backend {
        server app:3049;
    }

    # Upstream frontend development server
    upstream frontend {
        server 127.0.0.1:4200;
    }

    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        # Disable cache for development, enable cache headers for production files
        add_header Cache-Control "public, max-age=3600" always;

        # Security headers
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        location /api/v1/files/ {
            # 這裡的 IP 請換成你 Angular 容器的 IP (如 172.18.0.6) 
            # 或者 Docker Compose 的服務名稱 (如 frontend)
            proxy_pass http://172.18.0.6:4200/api/v1/files/;

            # --- 解決 SSRF / Allowed Hosts 報錯的關鍵設定 ---
            # 1. 傳遞原始 Host (localhost)
            proxy_set_header Host $host;
            
            # 2. 傳遞標準的轉發標頭 (Angular 19 檢查項)
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port $server_port;

            # 3. 避免超時 (處理大檔案時建議加上)
            proxy_read_timeout 300s;
            proxy_connect_timeout 75s;
        }

        # API endpoints - proxy to backend
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            
            proxy_pass http://backend;
            proxy_http_version 1.1;
            
            # Headers for true IP forwarding
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket support for SSE
            proxy_set_header Connection "upgrade";
            proxy_set_header Upgrade $http_upgrade;
            
            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            # Buffer settings for large responses
            proxy_buffering off;
            proxy_request_buffering off;
        }

        # File upload endpoint - TUS protocol
        location /api/v1/tus/ {
            limit_req zone=api_limit burst=50 nodelay;
            
            proxy_pass http://backend;
            proxy_http_version 1.1;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Important for TUS protocol
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_request_buffering off;
            
            # Allow larger uploads
            client_max_body_size 10G;
            
            # Timeouts for long uploads
            proxy_connect_timeout 300s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }

        # Frontend - proxy to Angular dev server
        location / {
            proxy_pass http://app:4200;

            proxy_http_version 1.1;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket support for development
            proxy_set_header Connection "upgrade";
            proxy_set_header Upgrade $http_upgrade;
            
            proxy_redirect off;
        }

        # Health check endpoint for Docker
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }
    }
}
